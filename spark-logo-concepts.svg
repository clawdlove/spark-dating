<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#FFFFFF"/>
  
  <!-- Title -->
  <text x="400" y="40" fill="#2D3436" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Logo Concepts</text>
  
  <!-- Concept A: The Strike -->
  <g transform="translate(200, 0)">
    <!-- Spark -->
    <text x="0" y="80" fill="#FF6B6B" font-size="28" text-anchor="middle">✦</text>
    <!-- Match head -->
    <circle cx="0" cy="135" r="18" stroke="#FF6B6B" stroke-width="3" fill="none"/>
    <!-- Match stick -->
    <path d="M0,153 L0,190 M-8,190 L0,180 L8,190" stroke="#FF6B6B" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Label -->
    <text x="0" y="230" fill="#2D3436" font-family="sans-serif" font-size="16" text-anchor="middle">A: The Strike</text>
  </g>
  
  <!-- Concept C: Single Match -->
  <g transform="translate(600, 0)">
    <!-- Star -->
    <text x="0" y="80" fill="#FF6B6B" font-size="28" text-anchor="middle">★</text>
    <!-- Match head -->
    <circle cx="0" cy="135" r="18" stroke="#FF6B6B" stroke-width="3" fill="none"/>
    <!-- Match stick -->
    <path d="M0,153 L0,190 M-8,190 L0,180 L8,190" stroke="#FF6B6B" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Label -->
    <text x="0" y="230" fill="#2D3436" font-family="sans-serif" font-size="16" text-anchor="middle">C: Single Match</text>
  </g>
  
  <!-- Divider -->
  <line x1="400" y1="60" x2="400" y2="200" stroke="#E0E0E0" stroke-width="1"/>
  
  <!-- Color note -->
  <text x="400" y="280" fill="#FF6B6B" font-family="sans-serif" font-size="14" text-anchor="middle">Color: #FF6B6B (Coral)</text>
</svg>